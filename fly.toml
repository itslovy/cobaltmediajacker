app = "mediajacker-cobalt-api"
primary_region = "yvr"

[build]
  dockerfile = "Dockerfile"

[env]
  API_PORT = "9000"
  API_LISTEN_ADDRESS = "0.0.0.0"

[http_service]
  internal_port = 9000
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "stop"
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
